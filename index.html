<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Friendship Test! 🧐</title>
<style>
  body { text-align: center; font-family: Arial, sans-serif; margin-top: 50px; background: #fefefe; transition: background 0.5s; }
  h1 { color: #ff4d4d; }
  .question { font-size: 22px; margin-top: 20px; }
  button {
    padding: 12px 25px; font-size: 18px; cursor: pointer; margin: 10px;
    border: none; border-radius: 8px; background: #ff6666; color: white;
    transition: transform 0.2s, background 0.3s;
  }
  button:hover { transform: scale(1.1); background: #ff1a1a; }
  #result { margin-top: 30px; font-size: 26px; font-weight: bold; color: #333; min-height: 60px; }
  #share { margin-top: 20px; font-size: 18px; color: #333; }
  #share input { width: 250px; padding: 5px; margin-right: 5px; font-size: 16px; }
</style>
</head>
<body>

<h1>Friendship Test! 🤔</h1>
<p>Answer a few questions to see if you are really my friend!</p>

<div id="quiz">
  <div class="question" id="question">Question will appear here</div>
  <div id="options"></div>
</div>

<div id="result"></div>

<div id="share" style="display:none;">
  <p>Send this link to your friend for a prank:</p>
  <input type="text" id="shareLink" readonly>
  <button onclick="copyLink()">Copy Link</button>
</div>

<!-- Confetti library -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script>
// Get name from URL parameter or pick random funny name
const urlParams = new URLSearchParams(window.location.search);
let name = urlParams.get('name');

const randomNames = ["Crazy Panda","Sneaky Ninja","Sleepy Cat","Alien Potato","Mysterious Blob","Cookie Monster","Angry Unicorn","Tiny Dragon"];
if(!name) {
  name = randomNames[Math.floor(Math.random() * randomNames.length)];
}

// Quiz questions
const quiz = [
  { q: "Do you remember my birthday?", options: ["Yes", "No"] },
  { q: "Would you share your last cookie with me?", options: ["Yes", "No"] },
  { q: "Do you like surprises?", options: ["Yes", "No"] }
];

// Prank messages (70% chance)
const prankMessages = [
  `${name}, you are not my friend! 😭`,
  `Oh no! ${name}, I hate you 😈`,
  `Error 404: Friendship not found 🤔`,
  `${name}, maybe we can try to be friends later 😜`
];

// Nice messages (30% chance)
const niceMessages = [
  `${name}, you are my best friend! 🎉`,
  `${name}, you are secretly an alien 👽`,
  `${name}, you stole my cookies! 🍪`
];

let currentQuestion = 0;

// Show quiz questions
function showQuestion() {
  if(currentQuestion >= quiz.length) { showResult(); return; }
  const q = quiz[currentQuestion];
  document.getElementById("question").innerText = q.q;
  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";
  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.innerText = opt;
    btn.onclick = () => { currentQuestion++; showQuestion(); };
    optionsDiv.appendChild(btn);
  });
}

// Show prank/nice result
function showResult() {
  const isPrank = Math.random() < 0.7;
  const message = isPrank ?
                  prankMessages[Math.floor(Math.random() * prankMessages.length)] :
                  niceMessages[Math.floor(Math.random() * niceMessages.length)];

  document.getElementById("quiz").style.display = "none";
  document.getElementById("result").innerText = message;

  if(!isPrank) {
    confetti({ particleCount:150, spread:80, origin:{y:0.6} });
    document.body.style.background = "#e6ffe6"; // green
  } else {
    document.body.style.background = "#ffe6e6"; // red
  }

  // Show share link section
  document.getElementById("share").style.display = "block";
  const shareInput = document.getElementById("shareLink");

  // Pick a new random name for next friend
  const nextName = randomNames[Math.floor(Math.random() * randomNames.length)];
  shareInput.value = `${window.location.origin}${window.location.pathname}?name=${encodeURIComponent(nextName)}`;
}

// Copy link function
function copyLink() {
  const link = document.getElementById("shareLink");
  link.select();
  link.setSelectionRange(0, 99999);
  document.execCommand("copy");
  alert("Link copied! Send it to your friend 😏");
}

showQuestion();
</script>

</body>
</html>
