<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Friend April Fools</title>
<style>
    body {
        font-family: 'Comic Sans MS', cursive, sans-serif;
        background: linear-gradient(to right, #ffd6e0, #fff7d6);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
    }
    .container {
        background: rgba(255, 255, 255, 0.9);
        padding: 30px 50px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        text-align: center;
        max-width: 500px;
        position: relative;
    }
    h1 {
        color: #ff4da6;
    }
    .question {
        font-size: 1.2rem;
        margin: 20px 0;
    }
    .buttons {
        margin-top: 20px;
    }
    button {
        padding: 10px 25px;
        margin: 10px;
        font-size: 1rem;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    button:hover {
        transform: scale(1.1);
    }
    .yes { background-color: #ff6b6b; color: white; }
    .no { background-color: #4da6ff; color: white; }
    .message {
        margin-top: 20px;
        font-size: 1.1rem;
        font-weight: bold;
        color: #ff4da6;
    }
    .character {
        position: absolute;
        bottom: -50px;
        width: 80px;
        transition: all 0.5s ease;
    }
    #bunny { left: -100px; }
    #bear { right: -100px; }
</style>
</head>
<body>
<div class="container">
    <h1>🤍 April Fools Prank 🤍</h1>
    <div class="question" id="question">Am I your best friend?</div>
    <div class="buttons">
        <button class="yes" onclick="answer('yes')">Yes</button>
        <button class="no" onclick="answer('no')">No</button>
    </div>
    <div class="message" id="message"></div>
    <img src="https://i.ibb.co/6JmM6PN/bunny.png" alt="Bunny" class="character" id="bunny">
    <img src="https://i.ibb.co/7v0Rk6C/bear.png" alt="Bear" class="character" id="bear">
</div>

<script>
let step = 0;

function answer(choice) {
    const question = document.getElementById('question');
    const message = document.getElementById('message');
    const bunny = document.getElementById('bunny');
    const bear = document.getElementById('bear');

    if (step === 0) {
        if (choice === 'yes') {
            message.textContent = "I knew it! You are a liar!";
        } else {
            message.textContent = "I know you hate me!";
        }
        question.textContent = "Who is your best friend?";
        step++;
    } else if (step === 1) {
        if (choice === 'me') {
            message.textContent = "You are a liar!";
        } else {
            message.textContent = "You have changed!";
        }
        question.textContent = "Do you want to get rid of me?";
        step++;
    } else if (step === 2) {
        if (choice === 'yes') {
            message.textContent = "Congratulations! You have lost me!";
        } else {
            message.textContent = "How rude are you!";
        }
        question.textContent = "🎉 APRIL FOOL! 🎉";
        document.querySelector('.buttons').style.display = 'none';
        bunny.style.left = "50px";
        bear.style.right = "50px";
    }
}

// Dynamically change buttons for the second question
document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
        if (step === 1) {
            document.querySelector('.yes').textContent = "Me";
            document.querySelector('.no').textContent = "Other";
        }
        if (step === 2) {
            document.querySelector('.yes').textContent = "Yes";
            document.querySelector('.no').textContent = "No";
        }
    });
});
</script>
</body>
</html>
