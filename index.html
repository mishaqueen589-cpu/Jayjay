<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Friendship Test - April Fool</title>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Comic Neue', cursive;
      background: linear-gradient(to bottom, #ffecd2, #fcb69f);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      text-align: center;
    }
    #container {
      background: rgba(255,255,255,0.95);
      padding: 50px;
      border-radius: 30px;
      box-shadow: 0 0 25px rgba(0,0,0,0.2);
      max-width: 500px;
      width: 90%;
      position: relative;
    }
    h1 {
      color: #ff6b81;
      margin-bottom: 25px;
      font-size: 2em;
      text-shadow: 1px 1px 3px #fff;
    }
    .question {
      font-size: 20px;
      margin: 25px 0;
    }
    .options {
      margin-top: 20px;
    }
    button {
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 20px;
      background-color: #ff6b81;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
    }
    button:hover {
      background-color: #ff4757;
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    }
    #characters {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
      z-index: 1;
    }
    #characters img {
      width: 100px;
      height: 100px;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    /* Floating stickers */
    .sticker {
      position: absolute;
      width: 50px;
      height: 50px;
      animation: float 8s infinite linear;
    }
    @keyframes float {
      0% { transform: translateY(100vh) translateX(0) rotate(0deg); }
      100% { transform: translateY(-50px) translateX(50px) rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="container">
    <h1>Friendship Test</h1>
    <div class="question" id="question">Am I your best friend?</div>
    <div class="options" id="options">
      <button onclick="answer('yes')">Yes</button>
      <button onclick="answer('no')">No</button>
    </div>
    <div id="characters">
      <img src="D:\Savage\download.png">
      <img src="D:\Savage\download.jpg">
    </div>
  </div>

  <!-- Floating stickers -->
  <img class="sticker" src="D:\Savage\download (1).jpg" style="left:10%;">
  <img class="sticker" src="D:\Savage\download (2).jpg" style="left:40%; animation-delay: 2s;">
  <img class="sticker" src="D:\Savage\images.jpg" style="left:70%; animation-delay: 4s;">

  <script>
    let step = 0;

    function answer(choice) {
      const question = document.getElementById('question');
      const options = document.getElementById('options');

      if(step === 0){
        if(choice === 'yes'){
          question.innerText = "I knew it! You are a liar 😏";
        } else {
          question.innerText = "I know you despise me 😢";
        }
        options.innerHTML = '<button onclick="nextStep()">Next</button>';
        step++;
      } 
      else if(step === 1){
        question.innerText = "Who is your best friend?";
        options.innerHTML = '<button onclick="answerBestFriend(\'me\')">Me</button><button onclick="answerBestFriend(\'other\')">Other</button>';
      }
      else if(step === 2){
        question.innerText = "Do you want to get rid of me?";
        options.innerHTML = '<button onclick="answerGetRid(\'yes\')">Yes</button><button onclick="answerGetRid(\'no\')">No</button>';
      }
    }

    function nextStep() {
      step = 1;
      const question = document.getElementById('question');
      const options = document.getElementById('options');
      question.innerText = "Who is your best friend?";
      options.innerHTML = '<button onclick="answerBestFriend(\'me\')">Me</button><button onclick="answerBestFriend(\'other\')">Other</button>';
    }

    function answerBestFriend(choice) {
      const question = document.getElementById('question');
      const options = document.getElementById('options');

      if(choice === 'me'){
        question.innerText = "You are a liar 😏";
      } else {
        question.innerText = "You have changed 😢";
      }
      options.innerHTML = '<button onclick="nextStep()">Next</button>';
      step = 2;
    }

    function answerGetRid(choice) {
      const question = document.getElementById('question');
      const options = document.getElementById('options');

      if(choice === 'yes'){
        question.innerText = "Congratulations! You have lost me 😎";
      } else {
        question.innerText = "You were lucky to have me 😏";
      }
      options.innerHTML = '<h2>APRIL FOOL! 🎉</h2>';
    }
  </script>
</body>
</html>
