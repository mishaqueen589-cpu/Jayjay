<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Friendship Test 🐻</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background: linear-gradient(135deg,#ff9ad5,#ffd6f6,#b8e7ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
overflow:hidden;
}

.box{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
max-width:450px;
}

h2{
color:#ff4fa3;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
background:#ff4fa3;
color:white;
transition:0.3s;
}

button:hover{
background:#ff2f90;
transform:scale(1.1);
}

.sticker{
position:absolute;
width:120px;
}

.bear1{top:20px; left:20px;}
.bear2{bottom:20px; right:20px;}

.result{
font-size:20px;
color:#444;
margin-top:20px;
}

</style>

</head>

<body>

<img class="sticker bear1" src="https://www.google.com/imgres?q=cute%20bear%20stickers&imgurl=https%3A%2F%2Fimg-16.stickers.cloud%2Fpacks%2Ff58780e6-e5fe-48f3-ac8b-55da9643f414%2Fwebp%2F5f4a0545-cff3-401f-83f5-bc5a8884611c.webp&imgrefurl=https%3A%2F%2Fstickers.cloud%2Fen%2Fpack%2Fcute-bear&docid=U4e_cW-HfY___M&tbnid=Vke-RGoNY0DgTM&vet=12ahUKEwjLwN-Ig9OTAxWegP0HHULFES8QnPAOegQIJxAB..i&w=512&h=512&hcb=2&ved=2ahUKEwjLwN-Ig9OTAxWegP0HHULFES8QnPAOegQIJxAB" >
<img class="sticker bear2" src= "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRRdwt6uRtvAlNrPP1zX718Jjvz9nxPAednJZTYtMcefg&s"s>

<div class="box">

<h2 id="question">Am I your best friend? 🥺</h2>

<div id="buttons">
<button onclick="answer('yes')">Yes</button>
<button onclick="answer('no')">No</button>
</div>

<p class="result" id="result"></p>

</div>

<script>

let step = 1;

function answer(choice){

let q = document.getElementById("question");
let r = document.getElementById("result");
let b = document.getElementById("buttons");

if(step==1){

if(choice=="yes"){
r.innerHTML="😏 I knew it... you are a liar.";
}else{
r.innerHTML="😔 I know you despise me.";
}

setTimeout(()=>{
q.innerHTML="Who is your best friend?";
b.innerHTML='<button onclick="answer2(`me`)">Me</button><button onclick="answer2(`other`)">Other</button>';
r.innerHTML="";
step=2;
},2000)

}

}

function answer2(choice){

let q = document.getElementById("question");
let r = document.getElementById("result");
let b = document.getElementById("buttons");

if(choice=="me"){
r.innerHTML="😂 Again lying?";
}else{
r.innerHTML="💔 Wow... you have changed.";
}

setTimeout(()=>{
q.innerHTML="Do you want to get rid of me?";
b.innerHTML='<button onclick="answer3(`yes`)">Yes</button><button onclick="answer3(`no`)">No</button>';
r.innerHTML="";
},2000)

}

function answer3(choice){

let q = document.getElementById("question");
let r = document.getElementById("result");
let b = document.getElementById("buttons");

if(choice=="yes"){
r.innerHTML="🎉 Congratulations! You have lost me!";
}else{
r.innerHTML="You are a fool!";
}

setTimeout(()=>{
q.innerHTML="😂 APRIL FOOL 😂";
r.innerHTML="IYKYK!<br>Just a prank  friend 🐻🐰";
b.innerHTML="";
},2000)

}

</script>

</body>
</html>
