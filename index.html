<!DOCTYPE html>

<html>
<head>
<title>Friendship Test</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#ffb6d9,#ffd6ea);
text-align:center;
padding:40px;
}

.card{
background:white;
padding:30px;
border-radius:20px;
max-width:420px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.logo{
font-size:45px;
}

button{
padding:12px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:12px;
background:#ff4da6;
color:white;
cursor:pointer;
}

button:hover{
transform:scale(1.1);
}

input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

.progress{
width:100%;
background:#eee;
border-radius:20px;
margin-top:15px;
}

.bar{
height:18px;
width:0%;
background:#ff4da6;
border-radius:20px;
}

#noBtn{
position:relative;
}

.share{
display:none;
margin-top:20px;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">🐻💖</div>

<h2>Friendship Test</h2>

<div id="start">

<p>Enter your name</p>

<input id="name" placeholder="Your name">

<br><br>

<button onclick="startTest()">Start</button>

</div>

<div id="quiz" style="display:none">

<h3 id="question"></h3>

<button onclick="next()">Yes</button>

<button id="noBtn" onmouseover="run()">No</button>

<div class="progress">
<div id="progressBar" class="bar"></div>
</div>

<p id="msg"></p>

</div>

<div class="share">

<button onclick="share()">Send to your friends</button>

</div>

</div>

<script>

let name="";

let step=0;

let score=100;

let questions=[

"Are you really my friend?",

"Do you know my birthday? 🎂",

"Do you know my favourite colour? 🎨",

"Do you hate me? 🤔",

"Do you reply to my messages quickly? 📱",

"Would you miss me if I disappeared? 👀",

"Do you ever ignore me? 😑",

"Will you stay my friend forever? 💖"

];

function startTest(){

name=document.getElementById("name").value;

if(name==""){

alert("Please enter your name");

return;

}

document.getElementById("start").style.display="none";

document.getElementById("quiz").style.display="block";

document.getElementById("question").innerHTML=questions[0];

}

function next(){

step++;

score-=10;

document.getElementById("progressBar").style.width=(step/questions.length*100)+"%";

document.getElementById("msg").innerHTML="Checking honesty...";

if(step<questions.length){

setTimeout(()=>{

document.getElementById("question").innerHTML=questions[step];

document.getElementById("msg").innerHTML="";

},800);

}

else{

finish();

}

}

function run(){

let btn=document.getElementById("noBtn");

btn.style.position="absolute";

btn.style.left=Math.random()*300+"px";

btn.style.top=Math.random()*200+"px";

}

function finish(){

document.getElementById("question").innerHTML="Analyzing Friendship...";

setTimeout(()=>{

document.getElementById("msg").innerHTML=name+", your friendship score is "+score+"%";

},2000);

setTimeout(()=>{

document.getElementById("msg").innerHTML="💔 Friendship Failed";

},4000);

setTimeout(()=>{

document.getElementById("msg").innerHTML="Deleting friendship data...";

},6000);

setTimeout(()=>{

document.getElementById("msg").innerHTML="😂 APRIL FOOL 😂<br>You are still my friend!";

document.querySelector(".share").style.display="block";

},8000);

}

function share(){

navigator.clipboard.writeText(window.location.href);

alert("Link copied! Send it to your friends 😈");

}

</script>

</body>
</html>
